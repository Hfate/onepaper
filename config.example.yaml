# 复制为 config.yaml 后修改。支持 ${ENV_VAR} 占位符。
# Docker Compose 部署请优先使用 config.docker.example.yaml（dsn 主机为 mysql，配图目录为容器路径）。

server:
  addr: ":8080"

database:
  # 可为空：不落库，仅跑流水线（适合联调）
  dsn: "root:password@tcp(127.0.0.1:3306)/onepaper?parseTime=true&loc=Local"

# LLM：任意 OpenAI 兼容 API（OpenAI / OpenRouter / DeepSeek 等）。base_url 需指向 .../v1。
# Key 可写死或用 ${AI_API_KEY}；未设置时程序会依次读环境变量 AI_API_KEY、OPENROUTER_API_KEY、DEEPSEEK_API_KEY、OPENAI_API_KEY。
# 也可用 AI_BASE_URL 环境变量补全 base_url（yaml 留空时）。
# OpenRouter 示例：base_url: "https://openrouter.ai/api/v1"，model: "openai/gpt-4o-mini"
# DeepSeek 示例：base_url: "https://api.deepseek.com/v1"，model: "deepseek-chat"
ai:
  base_url: "https://api.openai.com/v1"
  api_key: "${AI_API_KEY}"
  model: "gpt-4o-mini"
  score_model: "gpt-4o-mini"
  article_model: "gpt-4o-mini"
  max_retries: 3

crawler:
  arxiv_max_results: 20
  lookback_hours: 24

filter:
  top_n: 5

summarizer:
  min_words: 1500
  max_words: 2500

image:
  # 本机：./data/images；Docker：见 config.docker.example.yaml（一般为 /app/data/images）
  dir: "./data/images"
  min_width: 500
  min_height: 500
  download_timeout: "90s"

wechat:
  app_id: "${WECHAT_APP_ID}"
  app_secret: "${WECHAT_APP_SECRET}"
  author: "你的笔名"
  # draft: 仅草稿箱 | publish: 草稿后发布 | none: 跳过微信（仍会生成 HTML）
  publish_mode: "draft"

scheduler:
  enabled: true
  cron: "0 9 * * *"
  timezone: "Asia/Shanghai"

oss:
  enabled: false
  endpoint: ""
  bucket: ""
  public_url: ""
