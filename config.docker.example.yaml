# Docker：复用已有 MySQL（与 slowwindow 同 Docker 网络）时复制为 config.yaml。
#
# database 主机：对方 compose 里 MySQL 的 container_name（示例为 slowwindow-mysql）；
# 也可用服务名 mysql，前提是两个容器在同一 bridge 网络上且 DNS 能解析到该别名。
#
# 密码：与 slowwindow .env 一致；dsn 中支持 ${DB_ROOT_PASSWORD} / ${DB_USER} / ${DB_PASSWORD}，
# 由 docker-compose.yml 从宿主机 .env 注入容器环境后再做展开。

server:
  addr: ":8080"

database:
  # 推荐业务账号（先在 MySQL 里对 onepaper 库授权后再用）：
  # dsn: "${DB_USER}:${DB_PASSWORD}@tcp(slowwindow-mysql:3306)/onepaper?parseTime=true&loc=Local"
  dsn: "root:${DB_ROOT_PASSWORD}@tcp(slowwindow-mysql:3306)/onepaper?parseTime=true&loc=Local"

# LLM：OpenAI / OpenRouter / DeepSeek 等（OpenAI 兼容）。密钥可用 ${AI_API_KEY} 或与 .env 中 OPENROUTER_API_KEY、DEEPSEEK_API_KEY 等对应。
# base_url 未写时可依赖容器环境 AI_BASE_URL。
ai:
  base_url: "https://api.openai.com/v1"
  api_key: "${AI_API_KEY}"
  model: "gpt-4o-mini"
  score_model: "gpt-4o-mini"
  article_model: "gpt-4o-mini"
  max_retries: 3

crawler:
  arxiv_max_results: 20
  lookback_hours: 24

filter:
  top_n: 5

summarizer:
  min_words: 1500
  max_words: 2500

image:
  dir: "/app/data/images"
  min_width: 500
  min_height: 500
  download_timeout: "90s"

wechat:
  app_id: "${WECHAT_APP_ID}"
  app_secret: "${WECHAT_APP_SECRET}"
  author: "你的笔名"
  publish_mode: "draft"
  token: "${WECHAT_TOKEN}"
  encoding_aes_key: "${WECHAT_ENCODING_AES_KEY}"
  push_path: "/api/v1/wechat/serve"

scheduler:
  enabled: true
  cron: "0 9 * * *"
  timezone: "Asia/Shanghai"

oss:
  enabled: false
  endpoint: ""
  bucket: ""
  public_url: ""
