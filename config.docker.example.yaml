# 与 docker-compose.mysql.yml 联用时，复制为 config.yaml 并调整密码。
# database 主机名必须是 compose 服务名 `mysql`。

server:
  addr: ":8080"

database:
  dsn: "root:onepaper@tcp(mysql:3306)/onepaper?parseTime=true&loc=Local"

ai:
  base_url: "https://api.openai.com/v1"
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o-mini"
  score_model: "gpt-4o-mini"
  article_model: "gpt-4o-mini"
  max_retries: 3

crawler:
  arxiv_max_results: 20
  lookback_hours: 24

filter:
  top_n: 5

summarizer:
  min_words: 1500
  max_words: 2500

image:
  dir: "/app/data/images"
  min_width: 500
  min_height: 500
  download_timeout: "90s"

wechat:
  app_id: "${WECHAT_APP_ID}"
  app_secret: "${WECHAT_APP_SECRET}"
  author: "你的笔名"
  publish_mode: "draft"

scheduler:
  enabled: true
  cron: "0 9 * * *"
  timezone: "Asia/Shanghai"

oss:
  enabled: false
  endpoint: ""
  bucket: ""
  public_url: ""
