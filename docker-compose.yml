# 默认：复用已在运行中的 MySQL（例如 slowwindow 项目的 slowwindow-mysql）。
# 条件：本项目的 onepaper 容器加入对方栈使用的 Docker 网络；并在该实例上建库 onepaper。
# 详见 README「复用其它项目的 MySQL」。

services:
  onepaper:
    build: .
    image: hfate/onepaper:latest
    container_name: onepaper
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9090}:8080"
    environment:
      TZ: Asia/Shanghai
      # LLM：与 config 中 ai.base_url / 模型配合（OpenAI / OpenRouter / DeepSeek 等 OpenAI 兼容）
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-}
      OPENROUTER_X_TITLE: ${OPENROUTER_X_TITLE:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      # 与 config.yaml 里 database.dsn 中 ${VAR} 对应（常用 root + DB_ROOT_PASSWORD）
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - onepaper-data:/app/data
    networks:
      - mysql_external
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mysql_external:
    external: true
    # docker network ls 查看对方栈网络，多为「目录名_slowwindow-network」
    name: ${EXTERNAL_MYSQL_NETWORK:-slowwindow_slowwindow-network}

volumes:
  onepaper-data:
