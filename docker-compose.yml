services:
  onepaper:
    build: .
    image: hfate/onepaper:latest
    container_name: onepaper
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      TZ: Asia/Shanghai
      # 项目根目录 .env 供 Compose 做变量替换并传入容器（供 config 中 ${VAR} 使用）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - onepaper-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  onepaper-data:
