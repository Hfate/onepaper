# 可选：与 MySQL 一起启动
#   docker compose -f docker-compose.yml -f docker-compose.mysql.yml up -d
# 请先将 config.yaml 中 database.dsn 主机改为 mysql（可参考 config.docker.example.yaml）

services:
  mysql:
    image: mysql:8.0
    container_name: onepaper-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-onepaper}
      MYSQL_DATABASE: onepaper
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  onepaper:
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:
